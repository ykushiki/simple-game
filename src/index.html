<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>島RPGプロトタイプ</title>
    <!-- Three.js の読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 左上端に固定したステータスUI -->
    <div id="status-container">
        <div id="stage-display">STAGE: 1</div>
        <div id="hp-container">
            <span class="label">HP:</span>
            <div class="hp-bar-bg">
                <div id="hp-bar"></div>
            </div>
            <span id="hp-text">15 / 15</span>
        </div>
    </div>

    <div id="commit-info">commit: loading...<br>date: loading...</div>

    <!-- スマホ画面を占有する初期UI（操作を始めると消えます） -->
    <div id="ui">
        <h2>島RPG プロトタイプ</h2>
        <div id="controls">
            【前進/後退】▲ / ▼ (W / S)<br>
            【左右旋回】◀ / ▶ (A / D)<br>
            【アクション】攻撃 / 跳躍 (Space / E)
        </div>
    </div>

    <!-- 画面上の操作パッドUI -->
    <div id="virtual-pad">
        <!-- 左側：移動十字キー -->
        <div class="pad-cluster" id="move-cluster">
            <button class="pad-btn" id="btn-up">▲</button>
            <div class="horizontal-btns">
                <button class="pad-btn" id="btn-left">◀</button>
                <button class="pad-btn" id="btn-right">▶</button>
            </div>
            <button class="pad-btn" id="btn-down">▼</button>
        </div>

        <!-- 右側：アクションボタン -->
        <div class="pad-cluster" id="action-cluster">
            <button class="action-btn" id="btn-attack">攻撃</button>
            <button class="action-btn" id="btn-jump">跳躍</button>
        </div>
    </div>

    <!-- 最後にゲームロジックを読み込む -->
    <script src="game.js"></script>
</body>
</html>
